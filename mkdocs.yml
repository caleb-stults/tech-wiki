site_name: Tech Wiki
site_url: https://wiki.hoss-movies.com/
nav:
  - Home: index.md
  - Emby Server:
      - Emby Setup: movie-pipeline/emby/setup.md
      - Ripping (MakeMKV): movie-pipeline/makemkv/ripping.md
      - Compression (HandBrake): movie-pipeline/handbrake/compression.md
      - Emby Remote Access: movie-pipeline/emby/tailscale.md
      - Library Management: movie-pipeline/emby/library-management.md
  - Homelab Maintenance:
      - Introduction: homelab-maintenance/index.md
theme: 
  name: material
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode    
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
